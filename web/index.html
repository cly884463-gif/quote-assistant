      <div class="hero-shade"></div>
      <div class="hero-content">
        <div>
          <h1>装修材料报价助手</h1>
          <p>从产品卡片到报价清单，一次完成。</p>
        </div>
        <div class="quote-actions">
          <button class="primary-action" data-start-quote="dealer">创建经销商批发报价</button>
          <button class="primary-action secondary" data-start-quote="channel">创建渠道合作报价</button>
        </div>
      </div>
    </header>

    <main>
      <section class="view is-active" id="homeView">
        <div class="section-head">
          <div>
            <h2>材料预览</h2>
            <p>按材料类别查看产品，卡片内展示全部规格及两套价格。</p>
          </div>
          <input class="search-input" id="homeSearch" placeholder="搜索型号 / 类别 / 产品名称 / 规格">
        </div>
        <div class="category-list" id="homeCategories"></div>
      </section>

      <section class="view" id="quoteView">
        <div class="sticky-bar">
          <button class="text-btn" id="backHomeBtn">返回首页</button>
          <input class="search-input" id="quoteSearch" placeholder="搜索型号 / 类别 / 产品名称 / 规格">
          <div class="selected-bar">
            <span id="selectedCount">已选 0 项</span>
            <button class="summary-btn" id="goSummaryBtn">生成清单</button>
          </div>
        </div>
        <div class="quote-category-tabs" id="quoteCategoryTabs"></div>
        <div class="quote-list" id="quoteProducts"></div>
      </section>

      <section class="view" id="summaryView">
        <div class="summary-toolbar card">
          <button class="text-btn" id="backQuoteBtn">返回报价</button>
          <label>物流方式
            <select id="logisticsSelect"></select>
          </label>
          <label>送货方式
            <select id="deliverySelect"></select>
          </label>
          <label>税点
            <select id="taxSelect"></select>
          </label>
          <label class="summary-date-control">订单日期
            <input type="date" id="orderDate">
          </label>
          <label class="summary-person-control">业务负责人
            <input type="text" id="person" placeholder="请输入负责人姓名">
          </label>
          <label class="summary-remark-control">备注
            <textarea id="summaryRemark" rows="2" placeholder="可填写报价备注"></textarea>
          </label>
          <div class="summary-export-actions">
            <button class="export-btn" id="exportImageBtn">导出报价图片</button>
            <button class="export-btn" id="exportExcelBtn">导出Excel表格</button>
          </div>
        </div>

        <div class="sheet-scroll">
          <div class="quote-sheet" id="quoteSheet"></div>
        </div>
        <div class="notes card" id="noticeList"></div>
      </section>
    </main>
  </div>

  <div class="export-preview" id="exportPreview" aria-hidden="true">
    <div class="export-preview-panel">
      <div class="export-preview-head">
        <div>
          <strong>报价图片已生成</strong>
          <p id="exportPreviewTip">长按图片保存，或点右上角用浏览器打开后下载。</p>
        </div>
        <button class="text-btn" id="closeExportPreview">关闭</button>
      </div>
      <img id="exportPreviewImage" alt="报价清单图片">
    </div>
  </div>

  <canvas id="exportCanvas" class="export-canvas"></canvas>
  <script src="./data.js"></script>
  <script src="./vendor/exceljs.min.js"></script>
  <script src="./excel-export.js"></script>
  <script src="./app.js"></script>
</body>
</html>
